# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - rotinize-api-dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Define o diretório de trabalho padrão para os comandos 'run'
    defaults:
      run:
        working-directory: ./backend
    
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'
      
      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{ github.workspace }}/publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{ github.workspace }}/publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'rotinize-api-dev'
          package: .
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BC440AC630B747708AE72C9BE8BBA95F }}
          connection-strings: '[{"name": "DefaultConnection", "value": "${{ secrets.AZURE_SQL_DEFAULTCONNECTION_CONNECTIONSTRING }}", "type": "SQLAzure"}]'

      - name: Run EF Core Migrations
        uses: actions/checkout@v4 

      - name: Setup .NET for EF Tools
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Clear NuGet Cache
        run: dotnet nuget locals all --clear

      - name: Install EF Core Tools
        run: dotnet tool install --global dotnet-ef --version 8.0.4

      - name: Restore Dependencies
        run: dotnet restore backend/src/src.csproj

      - name: Apply Migrations on DB
        run: dotnet ef database update --project backend/src/src.csproj --connection "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"








